name = "salonereach"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-21"

# Per-user rate limiting for the two /api/gemini/* Pages Functions
# (functions/api/_lib/shared.ts). Namespace id is filled in once created —
# see docs/cloudflare-pages-deployment.md.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
